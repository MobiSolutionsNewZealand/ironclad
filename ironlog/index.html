<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1C1B1A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Ironclad</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="header">
    <div class="header-top">
      <span class="app-title">Ironclad</span>
      <div class="hr-status" id="hrStatus">
        <button class="btn-hr-connect" id="btnHRConnect">&#9825; Connect HR</button>
      </div>
      <span class="header-date" id="headerDate"></span>
    </div>
    <div class="day-chips" id="dayChips"></div>
  </header>

  <!-- ── Today ── -->
  <main class="view active" id="viewToday"></main>

  <!-- ── History ── -->
  <main class="view" id="viewHistory"></main>

  <!-- ── Program ── -->
  <main class="view" id="viewProgram"></main>

  <!-- ── Tab bar ── -->
  <nav class="tab-bar">
    <button class="tab-btn active" data-view="today">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 20V10"/><path d="M6 20v-4"/><path d="M18 20v-8"/>
      </svg>
      <span class="tab-label">Today</span>
    </button>
    <button class="tab-btn" data-view="history">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      <span class="tab-label">History</span>
    </button>
    <button class="tab-btn" data-view="program">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>
      <span class="tab-label">Program</span>
    </button>
  </nav>

  <!-- ── Confirm dialog ── -->
  <div class="dialog-overlay" id="dialogOverlay">
    <div class="dialog">
      <div class="dialog-title" id="dialogTitle"></div>
      <div class="dialog-message" id="dialogMessage"></div>
      <div class="dialog-buttons">
        <button class="btn-cancel" id="dialogCancel">Cancel</button>
        <button class="btn-confirm-danger" id="dialogConfirm">Delete</button>
      </div>
    </div>
  </div>

  <!-- ── Toast ── -->
  <div class="toast" id="toast"></div>

  <!-- ── Hidden file input ── -->
  <input type="file" accept=".json,application/json" class="file-input" id="importInput">

  <script src="app.js"></script>
</body>
</html>
