<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1C1B1A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Ironclad</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="header">
    <div class="header-top">
      <span class="app-title">Ironclad</span>
      <div class="hr-status" id="hrStatus">
        <button class="btn-hr-connect" id="btnHRConnect">&#9825; Connect HR</button>
      </div>
      <span class="header-date" id="headerDate"></span>
    </div>
    <div class="day-chips" id="dayChips"></div>
  </header>

  <!-- ── Today ── -->
  <main class="view active" id="viewToday"></main>

  <!-- ── History ── -->
  <main class="view" id="viewHistory"></main>

  <!-- ── Program ── -->
  <main class="view" id="viewProgram"></main>

  <!-- ── Exercises ── -->
  <main class="view" id="viewExercises"></main>

  <!-- ── Settings ── -->
  <main class="view" id="viewSettings"></main>

  <!-- ── Tab bar ── -->
  <nav class="tab-bar">
    <button class="tab-btn active" data-view="today">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 20V10"/><path d="M6 20v-4"/><path d="M18 20v-8"/>
      </svg>
      <span class="tab-label">Today</span>
    </button>
    <button class="tab-btn" data-view="history">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      <span class="tab-label">Progress</span>
    </button>
    <button class="tab-btn" data-view="program">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>
      <span class="tab-label">Program</span>
    </button>
    <button class="tab-btn" data-view="exercises">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6.5 6.5a3.5 3.5 0 1 0 7 0 3.5 3.5 0 1 0-7 0"/>
        <path d="M2 21v-2a5 5 0 0 1 5-5h4"/>
        <line x1="17" y1="14" x2="17" y2="22"/><line x1="13" y1="18" x2="21" y2="18"/>
      </svg>
      <span class="tab-label">Exercises</span>
    </button>
    <button class="tab-btn" data-view="settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      <span class="tab-label">Settings</span>
    </button>
  </nav>

  <!-- ── Confirm dialog ── -->
  <div class="dialog-overlay" id="dialogOverlay">
    <div class="dialog">
      <div class="dialog-title" id="dialogTitle"></div>
      <div class="dialog-message" id="dialogMessage"></div>
      <div class="dialog-buttons">
        <button class="btn-cancel" id="dialogCancel">Cancel</button>
        <button class="btn-confirm-danger" id="dialogConfirm">Delete</button>
      </div>
    </div>
  </div>

  <!-- ── QR overlay ── -->
  <div class="dialog-overlay" id="qrOverlay">
    <div class="dialog qr-dialog">
      <div class="dialog-title" id="qrTitle">Share Program</div>
      <div id="qrContent"></div>
      <div class="dialog-buttons">
        <button class="btn-cancel" id="qrClose">Close</button>
      </div>
    </div>
  </div>

  <!-- ── Scanner overlay ── -->
  <div class="scanner-overlay" id="scannerOverlay">
    <div class="scanner-header">
      <span class="scanner-title">Scan QR Code</span>
      <button class="btn-cancel" id="scannerClose">&times;</button>
    </div>
    <video id="scannerVideo" autoplay playsinline></video>
    <div class="scanner-status" id="scannerStatus">Point camera at a QR code</div>
  </div>

  <!-- ── Exercise picker overlay (for adding to program days) ── -->
  <div class="dialog-overlay" id="exercisePickerOverlay">
    <div class="dialog picker-dialog">
      <div class="dialog-title">Add Exercise</div>
      <input type="search" class="picker-search" id="pickerSearch" placeholder="Search exercises...">
      <div class="picker-filters" id="pickerFilters"></div>
      <div class="picker-list" id="pickerList"></div>
      <div class="dialog-buttons">
        <button class="btn-cancel" id="pickerClose">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ── Image viewer overlay ── -->
  <div class="dialog-overlay" id="imageViewerOverlay">
    <div class="image-viewer">
      <img id="imageViewerImg" src="" alt="">
      <button class="image-viewer-close" id="imageViewerClose">&times;</button>
    </div>
  </div>

  <!-- ── Toast ── -->
  <div class="toast" id="toast"></div>

  <!-- ── Hidden file input ── -->
  <input type="file" accept=".json,application/json" class="file-input" id="importInput">
  <input type="file" accept=".json,application/json" class="file-input" id="importProgramInput">
  <input type="file" accept="image/*" multiple class="file-input" id="exercisePhotoInput">

  <script src="qr.js"></script>
  <script src="app.js"></script>
</body>
</html>
